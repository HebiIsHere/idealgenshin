<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>理想原生 v5.0 — 首页预览</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300&family=Noto+Sans+SC:wght@300;400;500;600&family=Noto+Serif+SC:wght@200;400;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS — Furina 色板
   ============================================================ */
:root {
  --bg-deepest:     #000030;
  --bg-deep:        #091959;
  --sky:            #94CFF0;
  --sky-glow:       rgba(148,207,240,0.35);
  --sky-soft:       rgba(148,207,240,0.18);
  --royal:          #2850A0;
  --royal-soft:     rgba(40,80,160,0.25);
  --white-cyan:     #D0E8EF;
  --white-dim:      rgba(208,232,239,0.50);
  --gold:           #D0C4A6;
  --gold-dim:       rgba(208,196,166,0.18);
  --radius-full:    999px;
  --radius-lg:      16px;
  --radius-md:      12px;
  --ease-snappy:    cubic-bezier(0.16, 1, 0.3, 1);
  --ease-breathe:   cubic-bezier(0.45, 0, 0.55, 1);
  --ease-spring:    cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #000030;
  color: var(--white-cyan);
  min-height: 100vh;
  overflow-x: hidden;
}

/* noise */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ── 海面渐变层 ── */
.ocean-layer {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}
.ocean-layer--a {
  background: linear-gradient(180deg,
    transparent 0%,
    rgba(9,25,89,0.15) 40%,
    rgba(9,25,89,0.35) 70%,
    rgba(14,35,104,0.40) 85%,
    rgba(20,50,130,0.30) 95%,
    rgba(40,80,160,0.20) 100%);
  animation: waveShift 6s ease-in-out infinite;
}
.ocean-layer--b {
  background: linear-gradient(180deg,
    transparent 30%,
    rgba(9,25,89,0.20) 60%,
    rgba(14,35,104,0.35) 80%,
    rgba(20,50,130,0.25) 92%,
    rgba(40,80,160,0.15) 100%);
  animation: waveShift 8s ease-in-out 1s infinite reverse;
}
@keyframes waveShift {
  0%, 100% { transform: translateY(0) scaleY(1); }
  50%      { transform: translateY(-4px) scaleY(1.03); }
}

/* ── 中心光晕 ── */
.center-glow {
  position: fixed;
  top: 30%; left: 50%; transform: translate(-50%,-50%);
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(148,207,240,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ── 气泡 ── */
.bubbles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.bubble {
  position: absolute; bottom: -20px; border-radius: 50%;
  border: 1.5px solid rgba(148,207,240,0.22);
  background: transparent;
  animation: bubbleRise linear infinite;
}
@keyframes bubbleRise {
  0%   { transform: translateY(0) scale(0.4); opacity: 0.25; }
  20%  { opacity: 0.45; }
  100% { transform: translateY(-110vh) scale(1.4); opacity: 0; }
}

/* ── 主布局 ── */
.page {
  position: relative; z-index: 1;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

/* ── ② 标题下方淡金细线 ── */
.title-line {
  width: 120px; height: 1px; margin: -8px auto 16px;
  background: var(--gold); opacity: 0.22;
  animation: titleLineIn 0.6s 0.3s var(--ease-snappy) both;
}
@keyframes titleLineIn {
  from { width: 0; opacity: 0; }
  to   { width: 120px; opacity: 0.22; }
}
.title {
  font-family: 'Nunito', 'Noto Sans SC', sans-serif;
  font-weight: 200;
  font-size: clamp(2.6rem, 8vw, 6rem);
  color: var(--white-cyan);
  letter-spacing: 0.08em;
  line-height: 1.1;
  margin-bottom: 4px;
  text-align: center;
}
.title em {
  font-style: normal;
  color: var(--sky);
  font-weight: 200;
  letter-spacing: 0.06em;
}

.subtitle {
  font-weight: 300;
  color: var(--white-dim);
  font-size: clamp(0.9rem, 2vw, 1.5rem);
  letter-spacing: 0.06em;
  margin-bottom: 32px;
  text-align: center;
}

.desc {
  color: var(--white-dim);
  font-size: clamp(0.8rem, 1.5vw, 1.05rem);
  line-height: 1.8;
  margin-bottom: 48px;
  text-align: center;
}

/* ── 按钮 ── */
.btn-cta {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 48px;
  font-family: inherit; font-size: 1.1rem; font-weight: 600;
  letter-spacing: 0.04em;
  color: #000030;
  background: linear-gradient(135deg, var(--sky), var(--royal));
  border: none; border-radius: var(--radius-full); cursor: pointer;
  box-shadow: 0 0 24px rgba(148,207,240,0.30), 0 0 0 2px rgba(208,196,166,0.10);
  animation: btnFloat 3s ease-in-out infinite;
  transition: transform 0.2s var(--ease-spring),
              box-shadow 0.2s var(--ease-snappy);
}
.btn-cta:hover {
  transform: translateY(-4px);
  box-shadow: 0 0 48px rgba(148,207,240,0.45), 0 0 0 3px rgba(208,196,166,0.20);
}
.btn-cta:active { transform: translateY(0) scale(0.97); }
.btn-cta .icon { font-size: 1.3em; }
@keyframes btnFloat {
  0%, 100% { transform: translateY(0); box-shadow: 0 0 24px rgba(148,207,240,0.30); }
  50%      { transform: translateY(-10px); box-shadow: 0 0 40px rgba(148,207,240,0.50); }
}

/* ── 版本 ── */
.footer-note {
  color: rgba(208,232,239,0.18);
  font-size: 0.75rem; margin-top: 32px; text-align: center;
}

/* ── 右上存档按钮 ── */
.btn-icon {
  position: fixed; top: 16px; right: 16px; z-index: 20;
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: none; border: 1px solid rgba(255,255,255,0.08);
  color: var(--white-dim); cursor: pointer;
  transition: color 0.2s, border-color 0.2s, background 0.2s;
}
.btn-icon:hover { color: var(--sky); border-color: var(--sky-soft); background: rgba(148,207,240,0.06); }
.btn-icon svg { width: 18px; height: 18px; }

/* ── 左下下载按钮 ── */
.dl-wrap { position: fixed; bottom: 24px; left: 24px; z-index: 20; }
.dl-panel {
  position: absolute; bottom: 48px; left: 0;
  min-width: 200px; padding: 12px;
  background: rgba(9,25,89,0.96); backdrop-filter: blur(16px);
  border: 1px solid rgba(148,207,240,0.10); border-radius: var(--radius-md);
  display: none;
}
.dl-wrap.open .dl-panel { display: block; }
.dl-item {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; border-radius: var(--radius-md);
  font-size: 0.8rem; color: var(--white-dim); background: none; border: none;
  cursor: pointer; width: 100%; text-align: left; font-family: inherit;
  transition: color 0.15s, background 0.15s;
}
.dl-item:hover { color: var(--sky); background: rgba(148,207,240,0.06); }
.dl-label { font-size: 0.68rem; color: var(--white-dim); margin-bottom: 4px; padding: 0 12px; }

/* ── 卡片波浪修复：百分比相对坐标 ── */
.card-wave {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 24px; z-index: 0; pointer-events: none;
  opacity: 0; transition: opacity 0.35s var(--ease-snappy);
}
.card:hover .card-wave { opacity: 1; }
.card-wave svg { width: 100%; height: 100%; display: block; }
.card-wave path {
  fill: none; stroke: rgba(148,207,240,0.08);
  stroke-width: 1;
}

/* ── Furina 右半 SVG 背景 ── */
.furina-bg {
  position: fixed;
  top: -14vh;
  right: -50vw;
  width: 110vw;
  height: 132vh;
  object-fit: cover;
  object-position: 5% center;
  z-index: 0;
  pointer-events: none;
  animation: furinaBreathe 5s var(--ease-breathe) infinite;
}
@keyframes furinaBreathe {
  0%, 100% {
    opacity: 0.1;
    filter: hue-rotate(152deg) drop-shadow(0 0 60px rgba(148, 207, 240,0.18));
  }
  50% {
    opacity: 0.15;
    filter: hue-rotate(173deg) drop-shadow(0 0 100px rgba(40, 80, 160,0.28));
  }
}

/* a11y */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<!-- 海面 -->
<div class="ocean-layer ocean-layer--a"></div>
<div class="ocean-layer ocean-layer--b"></div>

<!-- 光晕 -->
<div class="center-glow"></div>

<!-- Furina 右半背景 -->
<img class="furina-bg" src="furina-bg.svg" alt="" aria-hidden="true">

<!-- 气泡 -->
<div class="bubbles">
  <div class="bubble" style="left:10%;width:22px;height:22px;animation-duration:7s;animation-delay:0s;border-color:rgba(208,196,166,0.22)"></div>
  <div class="bubble" style="left:22%;width:14px;height:14px;animation-duration:8s;animation-delay:1.5s"></div>
  <div class="bubble" style="left:35%;width:30px;height:30px;animation-duration:6.5s;animation-delay:0.8s"></div>
  <div class="bubble" style="left:48%;width:18px;height:18px;animation-duration:9s;animation-delay:3s"></div>
  <div class="bubble" style="left:58%;width:26px;height:26px;animation-duration:7.5s;animation-delay:2s;border-color:rgba(208,196,166,0.22)"></div>
  <div class="bubble" style="left:68%;width:10px;height:10px;animation-duration:8.5s;animation-delay:4s"></div>
  <div class="bubble" style="left:78%;width:22px;height:22px;animation-duration:6s;animation-delay:1s"></div>
  <div class="bubble" style="left:88%;width:14px;height:14px;animation-duration:7.5s;animation-delay:2.5s"></div>
</div>

<!-- 存档 -->
<button class="btn-icon" title="存档管理">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
</button>

<!-- 主内容 -->
<div class="page">

  <div class="title">IDEAL<em>GENSHIN</em></div>
  <div class="title-line"></div>
  <div class="subtitle">理想原生</div>

  <div class="desc">
    基于完整伤害公式的圣遗物词条优化工具<br>
    逐区填写 · 问答引导 · 可视化计算
  </div>

  <button class="btn-cta">
    <span class="icon">✦</span> 开始配置
  </button>

  <div class="footer-note">作者：袔苾<span style="color:var(--gold);opacity:0.5">&nbsp;·&nbsp;</span>v5.0</div>
</div>

<!-- 下载 -->
<div class="dl-wrap" id="dlWrap">
  <button class="btn-icon" onclick="document.getElementById('dlWrap').classList.toggle('open')" style="position:static">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
  </button>
  <div class="dl-panel">
    <div class="dl-label">下载文档</div>
    <button class="dl-item">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      项目介绍手册
    </button>
    <button class="dl-item">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      使用说明
    </button>
  </div>
</div>

</body>
</html>
