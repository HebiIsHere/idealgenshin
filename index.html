<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>理想原生</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="基于完整期望伤害公式的圣遗物词条优化工具，支持词条重分配与理想模板生成" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Nunito:wght@200;300&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Nunito:wght@200;300&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Nunito:wght@200;300&display=swap" /></noscript>
  </head>
  <body>
    <div id="root">
      <!-- 加载指示器：React 挂载前显示，挂载后自动替换 -->
      <div id="loading-splash" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0B1424;font-family:'Noto Sans SC','PingFang SC',sans-serif;flex-direction:column;gap:24px;">
        <div class="spinner-ring" style="width:48px;height:48px;border-radius:50%;position:relative;border:2px solid rgba(148,207,240,0.10);border-top-color:#94CFF0;animation:v5-spin 1.6s linear infinite;"></div>
        <div style="font-size:14px;letter-spacing:0.05em;color:rgba(208,232,239,0.55);display:flex;align-items:center;gap:4px;">
          正在加载
          <span style="display:inline-flex;align-items:center;gap:4px;margin-left:2px;">
            <span class="loading-dot" style="width:4px;height:4px;border-radius:50%;background:#D0E4DC;animation:v5-dot-bounce 0.8s cubic-bezier(0.45,0,0.55,1) infinite;display:inline-block;"></span>
            <span class="loading-dot" style="width:4px;height:4px;border-radius:50%;background:#D0E4DC;animation:v5-dot-bounce 0.8s 0.15s cubic-bezier(0.45,0,0.55,1) infinite;display:inline-block;"></span>
            <span class="loading-dot" style="width:4px;height:4px;border-radius:50%;background:#D0E4DC;animation:v5-dot-bounce 0.8s 0.3s cubic-bezier(0.45,0,0.55,1) infinite;display:inline-block;"></span>
          </span>
        </div>
        <style>
          @keyframes v5-spin{to{transform:rotate(360deg)}}
          @keyframes v5-dot-bounce{0%,100%{opacity:.2;transform:translateY(0)}50%{opacity:1;transform:translateY(-6px)}}
          .spinner-ring::after{content:'';position:absolute;inset:5px;border-radius:50%;border:2px solid transparent;border-bottom-color:#2850A0;animation:v5-spin 1.0s linear infinite reverse;}
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
