<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>理想原生</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="基于完整伤害公式的圣遗物词条优化工具，支持词条重分配与理想模板生成" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Nunito:wght@200;300&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- 加载指示器：React 挂载前显示，挂载后自动替换 -->
      <div id="loading-splash" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0B1424;color:#5BC0EB;font-family:'Noto Sans SC','PingFang SC',sans-serif;flex-direction:column;gap:16px;">
        <div style="width:40px;height:40px;border:3px solid rgba(91,192,235,0.3);border-top-color:#5BC0EB;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <div style="font-size:14px;letter-spacing:0.05em;">正在加载…</div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
